<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obsidian Vault - Visor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      padding: 0.7rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 { font-size: 1.2rem; color: #a78bfa; font-weight: 600; }

    .nav { display: flex; gap: 0.8rem; align-items: center; }
    .nav a, .nav button {
      color: #888; text-decoration: none; font-size: 0.8rem;
      padding: 0.35rem 0.7rem; border-radius: 6px; transition: all 0.2s;
      background: none; border: none; cursor: pointer;
    }
    .nav a:hover, .nav button:hover { color: #a78bfa; background: rgba(167,139,250,0.1); }
    .nav .active { color: #a78bfa; background: rgba(167,139,250,0.15); }

    /* Layout */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: #111118;
      border-right: 1px solid #1e1e30;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-search {
      padding: 0.6rem;
      border-bottom: 1px solid #1e1e30;
    }

    .sidebar-search input {
      width: 100%;
      padding: 0.45rem 0.7rem;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 0.8rem;
      outline: none;
    }

    .sidebar-search input:focus { border-color: #a78bfa; }

    .file-tree {
      flex: 1;
      overflow-y: auto;
      padding: 0.4rem 0;
    }

    .file-tree::-webkit-scrollbar { width: 6px; }
    .file-tree::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .tree-folder {
      user-select: none;
    }

    .folder-header {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.6rem 0.3rem calc(0.6rem + var(--depth, 0) * 1rem);
      cursor: pointer;
      font-size: 0.8rem;
      color: #888;
      transition: background 0.15s;
    }

    .folder-header:hover { background: #1a1a2e; color: #c4b5fd; }

    .folder-icon {
      font-size: 0.7rem;
      transition: transform 0.2s;
      width: 12px;
      text-align: center;
    }

    .folder-header.collapsed .folder-icon { transform: rotate(-90deg); }

    .folder-name { font-weight: 500; }

    .folder-count {
      margin-left: auto;
      font-size: 0.65rem;
      color: #555;
      background: #1a1a2e;
      padding: 0.1rem 0.4rem;
      border-radius: 8px;
    }

    .folder-children { overflow: hidden; }
    .folder-children.hidden { display: none; }

    .tree-file {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.6rem 0.3rem calc(1.2rem + var(--depth, 0) * 1rem);
      cursor: pointer;
      font-size: 0.8rem;
      color: #aaa;
      transition: all 0.15s;
      border-left: 2px solid transparent;
    }

    .tree-file:hover { background: #1a1a2e; color: #e0e0e0; }
    .tree-file.active { background: rgba(167,139,250,0.1); color: #c4b5fd; border-left-color: #a78bfa; }

    .file-icon { font-size: 0.7rem; opacity: 0.5; }

    .file-tags {
      margin-left: auto;
      display: flex;
      gap: 0.2rem;
    }

    .tag-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Content */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .breadcrumb {
      padding: 0.5rem 1.5rem;
      font-size: 0.75rem;
      color: #555;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    .breadcrumb span { color: #888; }
    .breadcrumb .sep { margin: 0 0.3rem; color: #333; }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 3rem;
      max-width: 900px;
    }

    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    /* Markdown rendering */
    .content h1 { font-size: 1.6rem; color: #c4b5fd; margin-bottom: 1rem; font-weight: 600; border-bottom: 1px solid #1e1e30; padding-bottom: 0.5rem; }
    .content h2 { font-size: 1.15rem; color: #a78bfa; margin: 1.5rem 0 0.6rem; font-weight: 600; }
    .content h3 { font-size: 1rem; color: #8b7cc8; margin: 1.2rem 0 0.5rem; }
    .content p { line-height: 1.7; margin-bottom: 0.8rem; color: #ccc; }
    .content strong { color: #e0e0e0; }
    .content em { color: #aaa; }
    .content code { background: #1a1a2e; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.85em; color: #c4b5fd; }
    .content hr { border: none; border-top: 1px solid #1e1e30; margin: 1.5rem 0; }

    .content ul, .content ol { margin: 0.5rem 0 1rem 1.5rem; }
    .content li { line-height: 1.6; margin-bottom: 0.3rem; color: #bbb; }

    .content table { width: 100%; border-collapse: collapse; margin: 0.8rem 0 1.2rem; }
    .content th { text-align: left; padding: 0.5rem 0.8rem; font-size: 0.8rem; color: #888; border-bottom: 2px solid #2a2a4a; font-weight: 600; }
    .content td { padding: 0.45rem 0.8rem; font-size: 0.85rem; border-bottom: 1px solid #1a1a1a; color: #ccc; }
    .content tr:hover td { background: rgba(167,139,250,0.03); }

    .content .wikilink {
      color: #a78bfa;
      text-decoration: none;
      border-bottom: 1px dashed rgba(167,139,250,0.4);
      cursor: pointer;
      transition: all 0.2s;
    }

    .content .wikilink:hover { color: #c4b5fd; border-bottom-color: #c4b5fd; }
    .content .wikilink.broken { color: #666; border-bottom-color: #333; }

    .content .dataview-block {
      background: #141420;
      border: 1px solid #1e1e30;
      border-radius: 8px;
      padding: 1rem;
      margin: 0.8rem 0;
      font-size: 0.8rem;
      color: #666;
      font-style: italic;
    }

    .frontmatter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1.2rem;
    }

    .fm-tag {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 500;
      background: rgba(167,139,250,0.1);
      color: #a78bfa;
    }

    .fm-meta {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 12px;
      font-size: 0.7rem;
      background: rgba(255,255,255,0.05);
      color: #777;
    }

    /* Backlinks */
    .backlinks {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid #1e1e30;
    }

    .backlinks h3 {
      font-size: 0.8rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.6rem;
    }

    .backlink-item {
      display: inline-block;
      padding: 0.3rem 0.7rem;
      margin: 0.2rem;
      background: #141420;
      border: 1px solid #1e1e30;
      border-radius: 6px;
      font-size: 0.8rem;
      color: #a78bfa;
      cursor: pointer;
      transition: all 0.2s;
    }

    .backlink-item:hover { background: rgba(167,139,250,0.1); border-color: #a78bfa; }

    /* Graph panel */
    .graph-panel {
      display: none;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .graph-panel.visible { display: block; }
    .content-area.graph-mode .content { display: none; }
    .content-area.graph-mode .breadcrumb { display: none; }
    .content-area.graph-mode .graph-panel { display: block; }

    #graph-canvas {
      width: 100%;
      height: 100%;
      background: #0a0a12;
    }

    .graph-legend {
      position: absolute;
      bottom: 1rem;
      left: 1rem;
      background: rgba(20,20,32,0.9);
      border: 1px solid #1e1e30;
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
      font-size: 0.7rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin: 0.2rem 0;
      color: #888;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* Welcome */
    .welcome {
      padding: 3rem;
      color: #555;
      max-width: 600px;
    }

    .welcome h2 { color: #666; font-size: 1.3rem; margin-bottom: 1rem; }
    .welcome p { line-height: 1.7; margin-bottom: 0.8rem; }

    .welcome .folder-list {
      list-style: none;
      margin: 1rem 0;
      padding: 0;
    }

    .welcome .folder-list li {
      padding: 0.5rem 0.8rem;
      margin: 0.3rem 0;
      background: #141420;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #888;
    }

    .welcome .folder-list li:hover { background: rgba(167,139,250,0.1); color: #c4b5fd; }
    .welcome .folder-list li .num { color: #a78bfa; font-weight: 600; margin-right: 0.5rem; }
  </style>
</head>
<body>

<header>
  <h1>Obsidian Vault</h1>
  <div class="nav">
    <a href="/">Subir factura</a>
    <a href="/db.html">Base de datos</a>
    <a href="/vault.html" class="active">Vault</a>
    <a href="/gastos.html">Gastos</a>
    <button id="btn-graph">Grafo</button>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="search" placeholder="Buscar notas...">
    </div>
    <div class="file-tree" id="file-tree"></div>
  </div>

  <div class="content-area" id="content-area">
    <div class="breadcrumb" id="breadcrumb" style="display:none"></div>
    <div class="content" id="content">
      <div class="welcome" id="welcome">
        <h2>Visor del Vault</h2>
        <p>Selecciona una nota del panel izquierdo o explora la estructura de carpetas.</p>
        <ul class="folder-list" id="folder-shortcuts"></ul>
      </div>
    </div>
    <div class="graph-panel" id="graph-panel">
      <canvas id="graph-canvas"></canvas>
      <div class="graph-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div> Dashboard</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f472b6"></div> Ideas</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div> Proyectos</div>
        <div class="legend-item"><div class="legend-dot" style="background:#38bdf8"></div> Conocimiento</div>
        <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div> Documentos</div>
        <div class="legend-item"><div class="legend-dot" style="background:#fb923c"></div> Personas</div>
        <div class="legend-item"><div class="legend-dot" style="background:#888"></div> Otros</div>
      </div>
    </div>
  </div>
</div>

<script>
const API = '/api/vault';
let treeData = [];
let graphData = null;
let allNotePaths = new Map(); // name -> path
let currentPath = null;
let graphMode = false;

// Tag colors
const TAG_COLORS = {
  idea: '#f472b6', proyecto: '#4ade80', activo: '#4ade80', archivado: '#888',
  conocimiento: '#38bdf8', 'documento-fuente': '#fbbf24', factura: '#fbbf24',
  persona: '#fb923c', empresa: '#fb923c', dashboard: '#a78bfa', sistema: '#a78bfa'
};

const FOLDER_COLORS = {
  '00 Ideas a desarrollar': '#f472b6',
  '10 Proyectos activos': '#4ade80',
  '20 Conocimiento y criterios': '#38bdf8',
  '30 Documentos fuente': '#fbbf24',
  '40 Personas y entidades': '#fb923c',
  '90 Proyectos archivados': '#666',
  'Templates': '#555'
};

// Init
async function init() {
  const res = await fetch(`${API}/tree`);
  treeData = await res.json();
  indexNotes(treeData, '');
  renderTree(treeData, document.getElementById('file-tree'), 0);
  renderFolderShortcuts();
}

function indexNotes(items, prefix) {
  items.forEach(item => {
    if (item.type === 'file') {
      allNotePaths.set(item.name, item.path);
    } else if (item.type === 'folder' && item.children) {
      indexNotes(item.children, item.path);
    }
  });
}

function countFiles(items) {
  let n = 0;
  items.forEach(item => {
    if (item.type === 'file') n++;
    else if (item.children) n += countFiles(item.children);
  });
  return n;
}

function renderTree(items, container, depth) {
  items.forEach(item => {
    if (item.type === 'folder') {
      const folder = document.createElement('div');
      folder.className = 'tree-folder';

      const count = countFiles(item.children || []);
      const header = document.createElement('div');
      header.className = 'folder-header';
      header.style.setProperty('--depth', depth);

      const folderColor = FOLDER_COLORS[item.name] || '#888';
      header.innerHTML = `
        <span class="folder-icon">&#9660;</span>
        <span class="folder-name" style="color:${folderColor}">${esc(item.name)}</span>
        <span class="folder-count">${count}</span>
      `;

      const children = document.createElement('div');
      children.className = 'folder-children';

      header.addEventListener('click', () => {
        header.classList.toggle('collapsed');
        children.classList.toggle('hidden');
      });

      folder.appendChild(header);
      folder.appendChild(children);
      container.appendChild(folder);

      if (item.children) {
        renderTree(item.children, children, depth + 1);
      }
    } else {
      const file = document.createElement('div');
      file.className = 'tree-file';
      file.style.setProperty('--depth', depth);
      file.dataset.path = item.path;

      let tagDots = '';
      if (item.tags && item.tags.length) {
        tagDots = '<div class="file-tags">' + item.tags.slice(0, 3).map(t => {
          const color = TAG_COLORS[t] || '#555';
          return `<div class="tag-dot" style="background:${color}" title="${esc(t)}"></div>`;
        }).join('') + '</div>';
      }

      file.innerHTML = `<span class="file-icon">&#9782;</span>${esc(item.name)}${tagDots}`;

      file.addEventListener('click', () => loadNote(item.path));
      container.appendChild(file);
    }
  });
}

function renderFolderShortcuts() {
  const el = document.getElementById('folder-shortcuts');
  const folders = treeData.filter(i => i.type === 'folder');
  el.innerHTML = folders.map(f => {
    const count = countFiles(f.children || []);
    const color = FOLDER_COLORS[f.name] || '#888';
    return `<li onclick="scrollToFolder('${esc(f.name)}')" style="border-left:3px solid ${color}">
      <span class="num">${count}</span>${esc(f.name)}
    </li>`;
  }).join('');

  // Add Dashboard
  if (allNotePaths.has('Dashboard')) {
    el.innerHTML = `<li onclick="loadNote('Dashboard.md')" style="border-left:3px solid #a78bfa">
      <span class="num">*</span>Dashboard
    </li>` + el.innerHTML;
  }
}

function scrollToFolder(name) {
  const headers = document.querySelectorAll('.folder-name');
  for (const h of headers) {
    if (h.textContent === name) {
      h.closest('.folder-header').scrollIntoView({ behavior: 'smooth', block: 'center' });
      h.closest('.folder-header').classList.remove('collapsed');
      const children = h.closest('.tree-folder').querySelector('.folder-children');
      if (children) children.classList.remove('hidden');
      break;
    }
  }
}

async function loadNote(notePath) {
  // Exit graph mode
  if (graphMode) toggleGraph();

  const res = await fetch(`${API}/note?path=${encodeURIComponent(notePath)}`);
  if (!res.ok) return;
  const { content: md } = await res.json();

  currentPath = notePath;

  // Update sidebar active state
  document.querySelectorAll('.tree-file').forEach(f => {
    f.classList.toggle('active', f.dataset.path === notePath);
  });

  // Breadcrumb
  const bc = document.getElementById('breadcrumb');
  bc.style.display = 'block';
  const parts = notePath.replace('.md', '').split('/');
  bc.innerHTML = parts.map((p, i) => {
    const color = (i === 0 && FOLDER_COLORS[p]) ? ` style="color:${FOLDER_COLORS[p]}"` : '';
    return `<span${color}>${esc(p)}</span>`;
  }).join('<span class="sep">/</span>');

  // Parse and render
  const contentEl = document.getElementById('content');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.style.display = 'none';

  const html = renderMarkdown(md);
  contentEl.innerHTML = html;

  // Add backlinks
  await renderBacklinks(notePath, contentEl);

  contentEl.scrollTop = 0;
}

function renderMarkdown(md) {
  // Remove frontmatter and extract it
  let body = md;
  let frontmatter = {};
  const fmMatch = md.match(/^---\n([\s\S]*?)\n---\n*/);
  if (fmMatch) {
    body = md.slice(fmMatch[0].length);
    fmMatch[1].split('\n').forEach(line => {
      const m = line.match(/^(\w[\w_]*)\s*:\s*(.+)/);
      if (m) {
        let val = m[2].trim();
        if (val.startsWith('[') && val.endsWith(']')) {
          val = val.slice(1, -1).split(',').map(s => s.trim().replace(/^"(.*)"$/, '$1'));
        } else {
          val = val.replace(/^"(.*)"$/, '$1');
        }
        frontmatter[m[1]] = val;
      }
    });
  }

  // Frontmatter bar
  let fmHtml = '';
  if (Object.keys(frontmatter).length) {
    const tags = Array.isArray(frontmatter.tags) ? frontmatter.tags : [];
    const metaKeys = ['tipo', 'status', 'prioridad', 'fecha_documento', 'created', 'currency', 'total'];
    const metas = metaKeys.filter(k => frontmatter[k]).map(k => {
      const v = Array.isArray(frontmatter[k]) ? frontmatter[k].join(', ') : frontmatter[k];
      return `<span class="fm-meta">${k}: ${esc(v)}</span>`;
    });

    fmHtml = '<div class="frontmatter-bar">' +
      tags.map(t => `<span class="fm-tag" style="background:${TAG_COLORS[t] ? `rgba(${hexToRgb(TAG_COLORS[t])},0.15)` : 'rgba(255,255,255,0.05)'};color:${TAG_COLORS[t] || '#888'}">${esc(t)}</span>`).join('') +
      metas.join('') +
    '</div>';
  }

  // Convert markdown to HTML
  let html = body;

  // Dataview blocks
  html = html.replace(/```dataview\n[\s\S]*?```/g, '<div class="dataview-block">Bloque Dataview (solo visible en Obsidian)</div>');

  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

  // Tables
  html = html.replace(/^(\|.+\|)\n(\|[\s-:|]+\|)\n((?:\|.+\|\n?)*)/gm, (match, headerRow, sepRow, bodyRows) => {
    const headers = headerRow.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const rows = bodyRows.trim().split('\n').map(row => {
      const cells = row.split('|').filter(c => c.trim()).map(c => {
        let cell = c.trim();
        // Bold in cells
        cell = cell.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        return `<td>${cell}</td>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
  });

  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Horizontal rules
  html = html.replace(/^---$/gm, '<hr>');

  // Bold and italic
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Wikilinks [[target]] and [[target|display]]
  html = html.replace(/\[\[([^\]]+)\]\]/g, (match, inner) => {
    const parts = inner.split('|');
    const target = parts[0].trim();
    const display = parts[1] ? parts[1].trim() : target;
    const targetPath = allNotePaths.get(target);
    const cls = targetPath ? 'wikilink' : 'wikilink broken';
    const onclick = targetPath ? `loadNote('${targetPath.replace(/'/g, "\\'")}')` : '';
    return `<a class="${cls}" onclick="${onclick}" title="${esc(target)}">${esc(display)}</a>`;
  });

  // Lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

  // Paragraphs - wrap remaining lines
  html = html.split('\n').map(line => {
    const trimmed = line.trim();
    if (!trimmed) return '';
    if (trimmed.startsWith('<')) return line;
    return `<p>${line}</p>`;
  }).join('\n');

  // Clean up empty paragraphs
  html = html.replace(/<p>\s*<\/p>/g, '');

  return fmHtml + html;
}

async function renderBacklinks(notePath, container) {
  if (!graphData) {
    const res = await fetch(`${API}/graph`);
    graphData = await res.json();
  }

  const noteName = notePath.replace(/^.*\//, '').replace('.md', '');
  const backlinks = graphData.links
    .filter(l => l.target === notePath)
    .map(l => {
      const node = graphData.nodes.find(n => n.id === l.source);
      return node ? { name: node.name, path: node.id } : null;
    })
    .filter(Boolean);

  const forwardLinks = graphData.links
    .filter(l => l.source === notePath)
    .map(l => {
      const node = graphData.nodes.find(n => n.id === l.target);
      return node ? { name: node.name, path: node.id } : null;
    })
    .filter(Boolean);

  if (backlinks.length === 0 && forwardLinks.length === 0) return;

  let html = '<div class="backlinks">';

  if (forwardLinks.length > 0) {
    html += '<h3>Enlaces salientes</h3>';
    html += forwardLinks.map(l =>
      `<div class="backlink-item" onclick="loadNote('${l.path.replace(/'/g, "\\'")}')">${esc(l.name)}</div>`
    ).join('');
  }

  if (backlinks.length > 0) {
    html += '<h3 style="margin-top:0.8rem">Enlaces entrantes</h3>';
    html += backlinks.map(l =>
      `<div class="backlink-item" onclick="loadNote('${l.path.replace(/'/g, "\\'")}')">${esc(l.name)}</div>`
    ).join('');
  }

  html += '</div>';
  container.insertAdjacentHTML('beforeend', html);
}

// Graph
async function toggleGraph() {
  graphMode = !graphMode;
  const area = document.getElementById('content-area');
  const btn = document.getElementById('btn-graph');

  if (graphMode) {
    area.classList.add('graph-mode');
    btn.classList.add('active');
    document.getElementById('graph-panel').classList.add('visible');
    await drawGraph();
  } else {
    area.classList.remove('graph-mode');
    btn.classList.remove('active');
    document.getElementById('graph-panel').classList.remove('visible');
  }
}

async function drawGraph() {
  if (!graphData) {
    const res = await fetch(`${API}/graph`);
    graphData = await res.json();
  }

  const canvas = document.getElementById('graph-canvas');
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  const W = rect.width;
  const H = rect.height;

  // Assign positions using force-directed layout
  const nodes = graphData.nodes.map((n, i) => ({
    ...n,
    x: W / 2 + (Math.random() - 0.5) * W * 0.6,
    y: H / 2 + (Math.random() - 0.5) * H * 0.6,
    vx: 0,
    vy: 0
  }));

  const nodeMap = new Map();
  nodes.forEach((n, i) => nodeMap.set(n.id, i));

  const links = graphData.links
    .map(l => ({ source: nodeMap.get(l.source), target: nodeMap.get(l.target) }))
    .filter(l => l.source !== undefined && l.target !== undefined);

  function getColor(node) {
    const f = node.folder.split('/')[0];
    return FOLDER_COLORS[f] || (node.folder === '' ? '#a78bfa' : '#555');
  }

  // Simulate
  const iterations = 200;
  for (let iter = 0; iter < iterations; iter++) {
    const alpha = 1 - iter / iterations;

    // Repulsion
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        let dx = nodes[j].x - nodes[i].x;
        let dy = nodes[j].y - nodes[i].y;
        let dist = Math.sqrt(dx * dx + dy * dy) || 1;
        let force = 800 * alpha / (dist * dist);
        let fx = dx / dist * force;
        let fy = dy / dist * force;
        nodes[i].vx -= fx;
        nodes[i].vy -= fy;
        nodes[j].vx += fx;
        nodes[j].vy += fy;
      }
    }

    // Attraction along links
    links.forEach(l => {
      let dx = nodes[l.target].x - nodes[l.source].x;
      let dy = nodes[l.target].y - nodes[l.source].y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      let force = (dist - 80) * 0.02 * alpha;
      let fx = dx / dist * force;
      let fy = dy / dist * force;
      nodes[l.source].vx += fx;
      nodes[l.source].vy += fy;
      nodes[l.target].vx -= fx;
      nodes[l.target].vy -= fy;
    });

    // Center gravity
    nodes.forEach(n => {
      n.vx += (W / 2 - n.x) * 0.001 * alpha;
      n.vy += (H / 2 - n.y) * 0.001 * alpha;
    });

    // Apply velocity
    nodes.forEach(n => {
      n.vx *= 0.8;
      n.vy *= 0.8;
      n.x += n.vx;
      n.y += n.vy;
      n.x = Math.max(30, Math.min(W - 30, n.x));
      n.y = Math.max(30, Math.min(H - 30, n.y));
    });
  }

  // Draw
  ctx.clearRect(0, 0, W, H);

  // Links
  ctx.strokeStyle = 'rgba(167,139,250,0.15)';
  ctx.lineWidth = 1;
  links.forEach(l => {
    ctx.beginPath();
    ctx.moveTo(nodes[l.source].x, nodes[l.source].y);
    ctx.lineTo(nodes[l.target].x, nodes[l.target].y);
    ctx.stroke();
  });

  // Nodes
  nodes.forEach(n => {
    const color = getColor(n);
    const hasLinks = links.some(l => nodes[l.source] === n || nodes[l.target] === n);
    const radius = hasLinks ? 6 : 4;

    // Glow
    ctx.beginPath();
    ctx.arc(n.x, n.y, radius + 3, 0, Math.PI * 2);
    ctx.fillStyle = color.replace(')', ',0.1)').replace('rgb', 'rgba');
    ctx.fill();

    // Node
    ctx.beginPath();
    ctx.arc(n.x, n.y, radius, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    // Label
    ctx.font = '10px -apple-system, sans-serif';
    ctx.fillStyle = '#888';
    ctx.textAlign = 'center';
    ctx.fillText(n.name.length > 20 ? n.name.slice(0, 18) + '..' : n.name, n.x, n.y + radius + 13);
  });

  // Click handler
  canvas.onclick = (e) => {
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left;
    const my = e.clientY - r.top;
    for (const n of nodes) {
      const dx = mx - n.x;
      const dy = my - n.y;
      if (dx * dx + dy * dy < 200) {
        toggleGraph();
        loadNote(n.id);
        break;
      }
    }
  };
}

// Search
document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.tree-file').forEach(f => {
    const name = f.textContent.toLowerCase();
    f.style.display = !q || name.includes(q) ? '' : 'none';
  });

  // Show all parent folders when searching
  if (q) {
    document.querySelectorAll('.folder-children').forEach(c => c.classList.remove('hidden'));
    document.querySelectorAll('.folder-header').forEach(h => h.classList.remove('collapsed'));
  }
});

// Graph button
document.getElementById('btn-graph').addEventListener('click', toggleGraph);

// Helpers
function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function hexToRgb(hex) {
  // Handle named colors or hex
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = 1;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = hex;
  ctx.fillRect(0, 0, 1, 1);
  const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
  return `${r},${g},${b}`;
}

init();
